<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PulseCliente - Gestão de Pesquisas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",

                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="flex min-h-screen">
<!-- Sidebar -->
<aside class="w-64 border-r border-slate-200 dark:border-slate-800 flex flex-col bg-white dark:bg-background-dark flex-shrink-0">
<div class="flex items-center gap-3 px-6 py-5">
<div class="size-9 flex items-center justify-center rounded-lg bg-primary text-white">
<span class="material-symbols-outlined">analytics</span>
</div>
<h1 class="text-base font-bold leading-none">PulseCliente</h1>
</div>
<nav class="flex-1 px-4 py-3 flex flex-col gap-1">
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary transition-colors" href="dashboard.html">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-sm font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold" href="pesquisas.html">
<span class="material-symbols-outlined">poll</span>
<span class="text-sm font-medium">Pesquisas</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary transition-colors" href="editor-perguntas.html">
<span class="material-symbols-outlined">edit_document</span>
<span class="text-sm font-medium">Editor</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary transition-colors" href="usuarios.html">
<span class="material-symbols-outlined">group</span>
<span class="text-sm font-medium">Público</span>
</a>
<div class="flex-1"></div>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary transition-colors" href="smtp.html">
<span class="material-symbols-outlined">settings_ethernet</span>
<span class="text-sm font-medium">Configurações SMTP</span>
</a>
</nav>

<span class="material-symbols-outlined text-primary">edit_document</span>
<h2 class="text-lg font-bold">Pesquisas</h2>
</div>
<div class="flex items-center gap-4">
<a id="btn-new-survey" href="#" class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-[20px]">add</span>
                        Nova Pesquisa
                    </a>
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-primary/20 border border-slate-300 dark:border-primary/30 overflow-hidden">
<img alt="Avatar do Usuário" class="w-full h-full object-cover" data-alt="Ilustração do avatar do perfil do usuário" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB8N5bg2vl8foKOGtph7C1J8eAi6fgftaWmqcemNWb0KdulhOGQ0TAOiVkdr1OxWYOmH-V6ATu6m2MhnKhb2t_uNEDezSvp9jAl2Z9PQgPUHSVSbKRNtSfF_XT8Zr3zI3d7qSb4k4EIBnhrPoqz0cZ_qg248lkq5GBcgMw-kSyCncY3ExB9OASAkmezkb6qAT-WatpsGKrJE5RlRKEfSSAILs0s8PaJIqh8aiOlyd0MpGNhsaZ4iW92hibIwApKNOH7zrVOAdkRPrGh"/>

</div>

<!-- Content Area -->
<div class="p-8 space-y-6">
<!-- Search and Filters -->
<div class="flex flex-col md:flex-row gap-4 items-center justify-between">
<div class="relative w-full md:w-96">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input id="search-survey" class="w-full pl-10 pr-4 py-2 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-sm" placeholder="Buscar pesquisas por título..." type="text"/>
</div>
<div class="flex gap-2 w-full md:w-auto">
<select id="filter-status" class="px-4 py-2 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-lg text-sm font-medium">
<option value="">Status: Todos</option>
<option value="active">Ativa</option>
<option value="draft">Rascunho</option>
<option value="closed">Fechada</option>
</select>
<select id="sort-survey" class="px-4 py-2 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-lg text-sm font-medium">
<option value="recent">Ordenar: Recentes</option>
<option value="oldest">Ordenar: Antigas</option>
<option value="title">Ordenar: Título</option>
</select>
</div>
</div>
<!-- Grid List -->
<div id="surveys-grid" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
<div class="col-span-full rounded-xl border border-slate-200 dark:border-primary/20 bg-white dark:bg-background-dark p-8 text-center text-slate-500 dark:text-slate-400">
Carregando pesquisas...
</div>
</div>

</div>
